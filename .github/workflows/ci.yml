name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: pms_dev
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Run Backend Tests
        run: |
          cd backend
          ./mvnw clean test
      - name: Publish JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install Dependencies & Test
        run: |
          cd frontend
          npm ci
          npm run test -- --coverage --coverage.lines=60 --coverage.functions=60 --coverage.branches=60 --coverage.statements=60

  backend-build:
    needs: [secrets-scan, backend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend
        run: |
          cd backend
          ./mvnw clean package -DskipTests
      - name: Build and Push Docker Image
        run: |
          cd backend
          docker build -t ghcr.io/${{ github.repository }}/backend:latest .
          # In a real environment, uncomment to push:
          # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # docker push ghcr.io/${{ github.repository }}/backend:latest

  frontend-build:
    needs: [secrets-scan, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Build and Push Docker Image
        run: |
          cd frontend
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest .
          # In a real environment, uncomment to push:
          # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          # docker push ghcr.io/${{ github.repository }}/frontend:latest

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
          else
            echo "Deploy hook not configured."
          fi
