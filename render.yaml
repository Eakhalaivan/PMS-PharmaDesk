services:
  # Backend Web Service (Docker)
  - type: web
    name: pharmacy-backend
    env: docker
    region: singapore
    plan: free
    dockerContext: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/pms?useSSL=true&enabledTLSProtocols=TLSv1.2,TLSv1.3&sslMode=REQUIRED
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGIN
        value: https://pharmacy-frontend.onrender.com

  # Frontend Web Service (Docker with Nginx)
  - type: web
    name: pharmacy-frontend
    env: docker
    region: singapore
    plan: free
    dockerContext: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_URL
        value: https://pharmacy-backend.onrender.com/api
